<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/globe.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Meridian — an atlas of country development built on World Bank Open Data." />
    <title>Meridian</title>
    <!--
      Static pre-React splash: shown instantly while the JS bundle downloads, before
      React mounts. It lives inside #root, so createRoot().render() replaces it on the
      first paint — nothing else is needed to remove it. Inline CSS because the app's
      stylesheet isn't loaded yet at this point. On-brand: ink background, accent-teal
      globe + spinner, "Meridian" wordmark. prefers-reduced-motion stops the spin.
    -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #app-splash .brand {
        display: flex;
        align-items: center;
        gap: 0.625rem;
      }
      #app-splash .wordmark {
        color: #ffffff;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      #app-splash .spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(13, 148, 136, 0.25);
        border-top-color: #0d9488;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="brand">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#0d9488"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
            <path d="M2 12h20" />
          </svg>
          <span class="wordmark">Meridian</span>
        </div>
        <div class="spinner" role="status" aria-label="Loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
