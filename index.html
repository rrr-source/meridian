<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Meridian — an atlas of country development built on World Bank Open Data." />
    <title>Meridian</title>
    <script>
      // Apply the saved theme + language BEFORE first paint so a reload never flashes
      // the wrong theme or language.
      (function () {
        try {
          var t = localStorage.getItem("meridian-theme");
          document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
        try {
          var l = localStorage.getItem("meridian-locale");
          document.documentElement.setAttribute("lang", l === "ru" ? "ru" : "en");
        } catch (e) {
          document.documentElement.setAttribute("lang", "en");
        }
      })();
    </script>
    <!--
      Static pre-React splash: shown instantly while the JS bundle downloads, before
      React mounts. It lives inside #root, so createRoot().render() replaces it on the
      first paint — nothing else is needed to remove it. Inline CSS because the app's
      stylesheet isn't loaded yet at this point. On-brand: canvas background, the
      Meridian mark + accent-teal spinner, "Meridian" wordmark. Respects the theme set
      above (light by default; deep ink in dark) — the mark's tile uses the accent and
      its M cut-out uses the splash background, so it reads as a hole in either theme.
      prefers-reduced-motion stops the spin.
    -->
    <style>
      #app-splash {
        --splash-bg: #f8fafc;
        --splash-fg: #0f172a;
        --splash-accent: #0d9488;
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: var(--splash-bg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      [data-theme="dark"] #app-splash {
        --splash-bg: #0a0f1a;
        --splash-fg: #f1f5f9;
        --splash-accent: #14b8a6;
      }
      #app-splash .brand {
        display: flex;
        align-items: center;
        gap: 0.625rem;
      }
      #app-splash .brand svg .tile {
        fill: var(--splash-accent);
      }
      #app-splash .brand svg .hole {
        fill: var(--splash-bg);
      }
      #app-splash .wordmark {
        color: var(--splash-fg);
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      #app-splash .spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid color-mix(in srgb, var(--splash-accent) 25%, transparent);
        border-top-color: var(--splash-accent);
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="brand">
          <svg width="32" height="32" viewBox="0 0 120 120" aria-hidden="true">
            <rect class="tile" x="0" y="0" width="120" height="120" rx="28" />
            <path
              class="hole"
              d="M30 88 L30 34 Q30 30 34 33 L60 62 L86 33 Q90 30 90 34 L90 88 L76 88 L76 52 L60 70 L44 52 L44 88 Z"
            />
          </svg>
          <span class="wordmark">Meridian</span>
        </div>
        <div class="spinner" role="status" aria-label="Loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
